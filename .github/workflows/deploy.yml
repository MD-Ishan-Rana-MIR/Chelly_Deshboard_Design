name: Build and Push Frontend Image to Docker Hub
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build and Push to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            kaziomar/cheyyla-dashboard:latest
            kaziomar/cheyyla-dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
            VITE_IMAGE_URL=${{ secrets.VITE_IMAGE_URL }}
            VITE_REVERB_APP_KEY=${{ secrets.VITE_REVERB_APP_KEY }}
            VITE_REVERB_HOST=${{ secrets.VITE_REVERB_HOST }}
            VITE_REVERB_PORT=${{ secrets.VITE_REVERB_PORT }}
            VITE_REVERB_SCHEME=${{ secrets.VITE_REVERB_SCHEME }}
            VITE_API_URL=${{ secrets.VITE_API_URL }}

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            docker compose pull cheyyla-dashboard
            docker compose up -d --no-deps cheyyla-dashboard
            
            echo "🔄 Reloading Nginx..."
            docker compose exec -T chelly-nginx nginx -s reload
            
            docker image prune -f
